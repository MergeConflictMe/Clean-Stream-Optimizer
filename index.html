<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER v2.1 | Безопасный Поток</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff41; padding: 40px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 20px #00ff41; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        #status { display: none; margin-top: 20px; font-size: 14px; }
        .loader-bar { width: 100%; background: #111; height: 10px; border: 1px solid #00ff41; margin-top: 10px; }
        .progress { width: 0%; height: 100%; background: #00ff41; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>[ LORD-CLEANER ]</h1>
    <p>Вставьте ссылку на Лордфильм:</p>
    <input type="text" id="targetUrl" placeholder="https://lordfilm...">
    <button id="goBtn" onclick="startOptimizing()">ОЧИСТИТЬ И ЗАПУСТИТЬ</button>

    <div id="status">
        <div id="log">> ПОДКЛЮЧЕНИЕ ФИЛЬТРА...</div>
        <div class="loader-bar"><div id="pBar" class="progress"></div></div>
    </div>
</div>

<script>
    function startOptimizing() {
        let rawUrl = document.getElementById('targetUrl').value.trim();
        
        if (!rawUrl) {
            alert('Сначала вставьте ссылку!');
            return;
        }

        // Авто-исправление ссылки, если юзер вставил без https
        if (!rawUrl.startsWith('http')) {
            rawUrl = 'https://' + rawUrl;
        }

        document.getElementById('goBtn').style.display = 'none';
        document.getElementById('status').style.display = 'block';

        let width = 0;
        const bar = document.getElementById('pBar');
        const log = document.getElementById('log');

        const interval = setInterval(() => {
            width += 10;
            bar.style.width = width + '%';
            
            if(width == 30) log.innerText = '> ОБХОД СКРИПТОВ КАЗИНО...';
            if(width == 70) log.innerText = '> ПОДГОТОВКА ПЛЕЕРА...';
            
            if (width >= 100) {
                clearInterval(interval);
                log.innerText = '> ПЕРЕХОД В БЕЗОПАСНЫЙ РЕЖИМ...';

                // ГЛАВНЫЙ МОМЕНТ: Используем CroxyProxy для стабильного видео
                // Мы формируем прямую ссылку на проксирование
                const finalLink = 'https://www.croxyproxy.com/_/_/search?q=' + encodeURIComponent(rawUrl);
                
                // Делаем переход через небольшую паузу
                setTimeout(() => {
                    window.location.href = finalLink;
                }, 1000);
            }
        }, 200);
    }
</script>

</body>
</html>
