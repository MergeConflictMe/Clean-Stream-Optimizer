<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | FINAL FIX</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff41; padding: 25px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 18px; text-decoration: none; display: block; }
        #loader { display: none; margin-top: 20px; }
        #finalBtn { display: none; background: #ff0055; color: #fff; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>[ LORD-CLEANER ]</h1>
    <div id="ui">
        <p>Вставь ссылку на фильм:</p>
        <input type="text" id="movieUrl" placeholder="https://nw.lordfilm...">
        <button class="btn" onclick="start()">УБРАТЬ РЕКЛАМУ</button>
    </div>

    <div id="loader">
        <div id="st">> ОЧИСТКА ПОТОКА...</div>
        <a href="" id="finalBtn" class="btn" target="_blank">СМОТРЕТЬ СЕЙЧАС</a>
    </div>
</div>

<script>
    function start() {
        let url = document.getElementById('movieUrl').value.trim();
        if(!url) return alert('Вставь ссылку!');

        document.getElementById('ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        // Формируем ссылку через Google Translate Proxy
        // Это "пробивает" блокировки и режет часть рекламы
        const proxyUrl = "https://translate.google.com/translate?sl=en&tl=ru&u=" + encodeURIComponent(url);
        
        const fb = document.getElementById('finalBtn');
        fb.href = proxyUrl;

        setTimeout(() => {
            document.getElementById('st').innerText = '> ССЫЛКА ГОТОВА!';
            fb.style.display = 'block';
        }, 1500);
    }
</script>

</body>
</html>
