<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-OPTIMIZER | Оренбург</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff41; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px #00ff41; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 18px; text-transform: uppercase; }
        #status { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>[ LORD-FIXER ]</h1>
    <div id="ui">
        <p>Вставь ссылку для обхода рекламы:</p>
        <input type="text" id="target" placeholder="https://nw.lordfilm...">
        <button class="btn" onclick="run()">ОЧИСТИТЬ И СМОТРЕТЬ</button>
    </div>

    <div id="status">
        <div id="log">> ПОДКЛЮЧЕНИЕ К ПРОКСИ...</div>
        <p>Подождите 3 секунды...</p>
    </div>
</div>

<script>
    function run() {
        const url = document.getElementById('target').value.trim();
        if(!url) return alert('Вставь ссылку!');

        // 1. ПОКАЗЫВАЕМ ЗАГРУЗКУ
        document.getElementById('ui').style.display = 'none';
        document.getElementById('status').style.display = 'block';

        // 2. ОТКРЫВАЕМ ТВОЮ РЕКЛАМУ (ЗАМЕНИ НА СВОЮ ССЫЛКУ ADSTERRA)
        // Если пока нет Adsterra, оставь Google для теста
        window.open('https://google.com', '_blank'); 

        // 3. ЧЕРЕЗ 2 СЕКУНДЫ ПЕРЕКИДЫВАЕМ НА ФИЛЬМ
        setTimeout(() => {
            // Прямой переход на Лордфильм. 
            // Это сработает ВСЕГДА, потому что браузер просто открывает сайт.
            window.location.href = url;
        }, 2000);
    }
</script>

</body>
</html>
