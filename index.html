<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | Финал</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff41; padding: 30px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 20px #00ff41; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 18px; text-decoration: none; display: block; }
        #loader { display: none; margin-top: 20px; }
        .bar { width: 100%; height: 12px; background: #111; border: 1px solid #00ff41; margin: 15px 0; }
        .progress { width: 0%; height: 100%; background: #00ff41; transition: 0.2s; }
        #finalBtn { display: none; background: #ff0055; color: #fff; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>[ ULTRA-CLEANER ]</h1>
    <div id="ui">
        <p>Вставьте ссылку на фильм:</p>
        <input type="text" id="u" placeholder="https://nw.lordfilm...">
        <button class="btn" onclick="go()">УБРАТЬ РЕКЛАМУ</button>
    </div>

    <div id="loader">
        <div id="st">> АНАЛИЗ ССЫЛКИ...</div>
        <div class="bar"><div id="pb" class="progress"></div></div>
        <a href="" id="finalBtn" class="btn" target="_blank">СМОТРЕТЬ (ЧИСТЫЙ ПЛЕЕР)</a>
    </div>
</div>

<script>
    function go() {
        let url = document.getElementById('u').value.trim();
        if(!url) return alert('Вставь ссылку!');

        document.getElementById('ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let p = 0;
        const pb = document.getElementById('pb');
        const st = document.getElementById('st');
        const fb = document.getElementById('finalBtn');

        const itv = setInterval(() => {
            p += 5;
            pb.style.width = p + '%';
            if(p == 30) st.innerText = '> ПОИСК В БАЗЕ VIDEOCDN...';
            if(p == 70) st.innerText = '> ВЫРЕЗАНИЕ СКРИПТОВ КАЗИНО...';
            
            if(p >= 100) {
                clearInterval(itv);
                st.innerText = '> ГОТОВО! НАЖМИ НИЖЕ:';
                
                // Самый надежный способ: используем сервис-обертку, 
                // который открывает только плеер по ссылке
                const clean = 'https://1649174020.vcdn.site/get_player?url=' + encodeURIComponent(url);
                
                fb.href = clean;
                fb.style.display = 'block';
            }
        }, 100);
    }
</script>

</body>
</html>
