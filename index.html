<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | Оренбург</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #00ff41; padding: 20px; background: #050505; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 15px; box-sizing: border-box; }
        .step { background: #222; padding: 10px; margin: 10px 0; border-left: 4px solid #00ff41; text-align: left; font-size: 14px; }
        button { width: 100%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; margin-bottom: 10px; }
        .copy-btn { background: #555; color: #fff; }
    </style>
</head>
<body>
    <div class="box">
        <h1>[ LORD-CLEANER ]</h1>
        <input type="text" id="link" placeholder="Вставь ссылку на фильм...">
        
        <div class="step">Шаг 1: Скопируй "Киллер-код"</div>
        <button class="copy-btn" onclick="copyCode()">СКОПИРОВАТЬ КОД</button>

        <div class="step">Шаг 2: Перейди на сайт</div>
        <button onclick="goToSite()">ОТКРЫТЬ ЛОРДФИЛЬМ</button>
        
        <p style="font-size: 11px; color: #888;">После перехода вставь код в адресную строку и нажми перейти</p>
    </div>

    <script>
        function copyCode() {
            const code = "javascript:(function(){document.querySelectorAll('.reklama, .ads, [class*=\"casino\"]').forEach(el=>el.remove()); window.open=function(){return null;}; alert('РЕКЛАМА УБИТА');})();";
            navigator.clipboard.writeText(code);
            alert("Код скопирован! Теперь вставь его в адресную строку на Лордфильме.");
        }

        function goToSite() {
            const url = document.getElementById('link').value.trim();
            if(url) window.location.href = url;
            else alert("Сначала вставь ссылку!");
        }
    </script>
</body>
</html>
