<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | No-Redirect Edition</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #top-panel { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #00ff41; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #00ff41; color: #00ff41; outline: none; }
        button { padding: 12px 20px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #viewer-container { flex: 1; width: 100%; position: relative; background: #111; }
        /* Сам фрейм с сайтом */
        iframe { width: 100%; height: 100%; border: none; display: none; }
        .placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

<div id="top-panel">
    <strong>[ CLEANER ]</strong>
    <input type="text" id="urlInput" placeholder="Вставьте ссылку на Венома (или другой фильм)...">
    <button onclick="loadStream()">СМОТРЕТЬ БЕЗ РЕКЛАМЫ</button>
</div>

<div id="viewer-container">
    <div id="msg" class="placeholder">
        <h3>Система очистки готова.</h3>
        <p>Вставьте ссылку и нажмите кнопку. Всплывающие окна будут заблокированы.</p>
    </div>
    
    <iframe id="mainView" 
            sandbox="allow-forms allow-scripts allow-same-origin" 
            src="">
    </iframe>
</div>

<script>
    function loadStream() {
        const url = document.getElementById('urlInput').value.trim();
        if(!url) return alert('Вставь ссылку!');

        const frame = document.getElementById('mainView');
        const msg = document.getElementById('msg');

        msg.innerHTML = "<h3>ИДЕТ ФИЛЬТРАЦИЯ...</h3>";
        
        // Загружаем сайт прямо здесь
        frame.src = url;
        frame.style.display = 'block';
        
        // Через 2 секунды убираем сообщение
        setTimeout(() => {
            msg.style.display = 'none';
        }, 2000);
    }
</script>

</body>
</html>
