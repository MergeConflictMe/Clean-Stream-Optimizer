<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | Оренбург Power</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #panel { padding: 15px; background: #0a0a0a; border-bottom: 2px solid #00ff41; display: flex; gap: 10px; z-index: 10; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #00ff41; color: #00ff41; outline: none; font-size: 14px; }
        button { padding: 12px 20px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #container { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%; }
    </style>
</head>
<body>

<div id="panel">
    <strong>[ CLEANER_V8 ]</strong>
    <input type="text" id="targetUrl" placeholder="Вставь ссылку на фильм...">
    <button onclick="cleanLoad()">ОЧИСТИТЬ И ОТКРЫТЬ</button>
</div>

<div id="container">
    <div id="intro" class="overlay">
        <h2>СИСТЕМА ГОТОВА</h2>
        <p>Вставьте ссылку. Реклама и всплывающие окна будут заблокированы автоматически.</p>
    </div>
    
    <iframe id="view" 
            sandbox="allow-forms allow-scripts allow-same-origin" 
            src="" 
            style="display:none;">
    </iframe>
</div>

<script>
    function cleanLoad() {
        const url = document.getElementById('targetUrl').value.trim();
        if(!url) return alert('Вставь ссылку!');

        // Прячем текст, показываем плеер
        document.getElementById('intro').style.display = 'none';
        const frame = document.getElementById('view');
        frame.style.display = 'block';
        
        // Загружаем сайт
        frame.src = url;

        // ВТОРАЯ СТЕПЕНЬ ЗАЩИТЫ: 
        // При попытке кликнуть на рекламу внутри фрейма, sandbox её не выпустит.
        // Если хочешь заработать, добавь свою рекламу Adsterra тут:
        // window.open('ТВОЯ_ССЫЛКА_ADSTERRA', '_blank');
    }
</script>

</body>
</html>
