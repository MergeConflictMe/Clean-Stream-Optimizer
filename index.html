<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ LORD-CLEANER ]</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        .terminal { border: 2px solid #00ff41; max-width: 800px; margin: 0 auto; background: #050505; padding: 20px; box-shadow: 0 0 15px #00ff41; }
        input { width: 85%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 15px; outline: none; }
        button { width: 85%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        #player-box { margin-top: 20px; width: 100%; min-height: 400px; border: 1px solid #222; background: #111; display: none; }
        .loader { color: #888; display: none; margin: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>[ LORD-CLEANER v2.0 ]</h1>
    <p>Введите название фильма или ID Кинопоиска:</p>
    
    <input type="text" id="movieSearch" placeholder="Например: Матрица или 301">
    <br>
    <button onclick="findAndPlay()">НАЙТИ БЕЗ РЕКЛАМЫ</button>
    <div id="loader" class="loader">Ищем живое зеркало...</div>

    <div id="player-box"></div>
</div>

<script src="https://kinobox.tv/static/kinobox.min.js"></script>

<script>
    function findAndPlay() {
        const val = document.getElementById('movieSearch').value.trim();
        const playerBox = document.getElementById('player-box');
        const loader = document.getElementById('loader');

        if (!val) return alert("Введите название!");

        loader.style.display = 'block';
        playerBox.style.display = 'block';
        playerBox.innerHTML = ''; // Очистка старого плеера

        // Запуск умного подбора зеркала
        new Kinobox('#player-box', {
            search: { query: val },
            players: {
                // Включаем все базы, скрипт сам выберет ту, которая НЕ ЗАБЛОКИРОВАНА
                alloha: { enable: true },
                videocdn: { enable: true },
                voidboost: { enable: true },
                ashdi: { enable: true }
            }
        }).init();

        loader.style.display = 'none';
    }
</script>

</body>
</html>
