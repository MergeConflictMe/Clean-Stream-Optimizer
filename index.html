<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEAN-PLAYER</title>
    <style>
        body { background: #000; color: #00ff41; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .main-box { width: 90%; max-width: 800px; text-align: center; border: 1px solid #333; padding: 20px; background: #0a0a0a; }
        input { width: 80%; padding: 12px; background: #000; border: 1px solid #00ff41; color: #fff; margin-bottom: 15px; outline: none; }
        button { padding: 12px 30px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #player-area { display: none; margin-top: 20px; width: 100%; position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        #player-area iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .loader { display: none; margin: 20px; color: yellow; }
    </style>
</head>
<body>

<div class="main-box">
    <h2>[ ЧИСТЫЙ ПЛЕЕР v7 ]</h2>
    <div id="input-zone">
        <p>Вставь ссылку с Lordfilm для очистки:</p>
        <input type="text" id="filmUrl" placeholder="https://nw.lordfilm...">
        <br>
        <button onclick="startCleaning()">ЗАПУСТИТЬ ВИДЕО</button>
    </div>

    <div id="loading" class="loader">ИДЕТ ПОИСК ВИДЕО В БАЗЕ...</div>

    <div id="player-area">
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    function startCleaning() {
        const url = document.getElementById('filmUrl').value.trim();
        if(!url) return alert('Вставь ссылку!');

        document.getElementById('input-zone').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        // Мы не переходим в Гугл. Мы берем только ID фильма из твоей ссылки
        // Например из /42292-venom.html вытаскиваем 42292
        const match = url.match(/\/(\d+)-/);
        const movieId = match ? match[1] : null;

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('player-area').style.display = 'block';

            // Если нашли ID - используем прямую базу. Если нет - универсальный обходчик.
            let finalSrc;
            if(movieId) {
                finalSrc = "https://v1649174020.vcdn.site/embed/" + movieId;
            } else {
                finalSrc = "https://black-vid.com/embed?url=" + encodeURIComponent(url);
            }

            document.getElementById('videoFrame').src = finalSrc;
        }, 1500);
    }
</script>

</body>
</html>
