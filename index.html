<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | Direct Stream</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .box { border: 2px solid #00ff41; padding: 25px; width: 90%; max-width: 600px; text-align: center; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        #player-box { display: none; width: 100%; margin-top: 20px; position: relative; padding-bottom: 56.25%; height: 0; }
        #player-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info { margin-top: 10px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="box" id="setup">
    <h1>[ LORD-CLEANER ]</h1>
    <p>Вставь ссылку на страницу фильма:</p>
    <input type="text" id="url" placeholder="https://nw.lordfilm133.ru/filmy/42292-venom...">
    <button onclick="play()">СМОТРЕТЬ БЕЗ РЕКЛАМЫ</button>
    <p class="info">Видео откроется прямо здесь без перехода на сайт</p>
</div>

<div id="player-box">
    <iframe id="video" src="" allowfullscreen></iframe>
    <br>
    <button onclick="location.reload()" style="margin-top:20px; background:#333; color:#fff;">НАЗАД</button>
</div>

<script>
    function play() {
        const val = document.getElementById('url').value.trim();
        if(!val) return alert('Вставь ссылку!');

        // Извлекаем ID (цифры) из ссылки. Например 42292
        const match = val.match(/\/(\d+)-/);
        const id = match ? match[1] : null;

        if(!id) {
            alert('Не удалось распознать фильм. Вставьте полную ссылку на страницу Лордфильма!');
            return;
        }

        // Прячем ввод, показываем плеер
        document.getElementById('setup').style.display = 'none';
        document.getElementById('player-box').style.display = 'block';

        // Используем самый стабильный плеер-агрегатор
        // Он берет ID и выдает видео. Это НЕ редирект, это вставка видео в твой сайт.
        document.getElementById('video').src = "https://v1649174020.vcdn.site/embed/" + id;
        
        // Сюда можешь вставить свою Adsterra, она откроется ПОВЕРХ при первом клике
        // window.open('ТВОЯ_ССЫЛКА_ADSTERRA', '_blank');
    }
</script>

</body>
</html>
