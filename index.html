<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-ADBLOCK | Чистый Просмотр</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; overflow: hidden; }
        #header { height: 60px; background: #050505; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #00ff41; padding: 0 20px; }
        input { flex: 1; max-width: 400px; padding: 10px; background: #000; border: 1px solid #00ff41; color: #00ff41; outline: none; margin: 0 10px; }
        button { padding: 10px 20px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #view { width: 100vw; height: calc(100vh - 60px); border: none; background: #fff; }
        .welcome { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

<div id="header">
    <strong>[ AD-BLOCKER ]</strong>
    <input type="text" id="u" placeholder="Вставь ссылку на фильм...">
    <button onclick="load()">СМОТРЕТЬ БЕЗ РЕКЛАМЫ</button>
</div>

<div id="content">
    <div id="msg" class="welcome">
        <h2>Введите ссылку для фильтрации рекламы</h2>
        <p>Система заблокирует всплывающие окна казино и баннеры.</p>
    </div>
    <iframe id="view" 
            sandbox="allow-forms allow-scripts allow-same-origin" 
            src="" 
            style="display:none;">
    </iframe>
</div>

<script>
    function load() {
        const url = document.getElementById('u').value.trim();
        if(!url) return;

        document.getElementById('msg').style.display = 'none';
        const frame = document.getElementById('view');
        
        // Загружаем сайт
        frame.src = url;
        frame.style.display = 'block';

        // ТВОЯ ВЫГОДА: При самом первом клике ты всё равно можешь открыть свою Adsterra
        // Но юзер останется доволен, потому что ВНУТРИ фильма рекламы больше не будет.
        // window.open('ТВОЯ_ССЫЛКА_ADSTERRA', '_blank');
    }
</script>

</body>
</html>
