<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | Оренбург</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; margin: 0; }
        .box { border: 2px solid #00ff41; padding: 20px; background: #050505; max-width: 800px; margin: 0 auto; }
        input { width: 90%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 15px; }
        button { width: 90%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; }
        #kinobox-player { margin-top: 20px; width: 100%; min-height: 450px; background: #111; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="box">
        <h1>[ LORD-CLEANER ]</h1>
        <p>Введи название фильма или сериала:</p>
        <input type="text" id="search-input" placeholder="Например: Брат 2">
        <button onclick="searchMovie()">НАЙТИ И СМОТРЕТЬ</button>

        <div id="kinobox-player"></div>
    </div>

    <script src="https://kinobox.tv/static/kinobox.min.js"></script>
    <script>
        function searchMovie() {
            const query = document.getElementById('search-input').value;
            if (!query) return alert("Введите название!");

            // Очищаем старый плеер перед новым поиском
            document.getElementById('kinobox-player').innerHTML = '';

            // Запуск поиска по базам
            new Kinobox('#kinobox-player', {
                search: {
                    query: query
                },
                players: {
                    // Список баз, по которым ищем
                    alloha: { enable: true },
                    videocdn: { enable: true },
                    voidboost: { enable: true }
                }
            }).init();
        }
    </script>

</body>
</html>
