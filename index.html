<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LORD-CLEANER PRO</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 10px; background: #050505; border-bottom: 2px solid #00ff41; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 10px; }
        button { background: #00ff41; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="urlInput" placeholder="Вставь ссылку на фильм с Лордфильма...">
        <button onclick="loadMovie()">СМОТРЕТЬ БЕЗ РЕКЛАМЫ</button>
    </div>

    <iframe is="x-frame-bypass" id="movieFrame"></iframe>

    <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <script>
        function loadMovie() {
            const url = document.getElementById('urlInput').value.trim();
            if (url) {
                document.getElementById('movieFrame').src = url;
            } else {
                alert("Сначала вставь ссылку!");
            }
        }
    </script>
</body>
</html>
