<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-PLAYER | Чистый Поток</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .box { border: 2px solid #00ff41; padding: 20px; width: 90%; max-width: 800px; text-align: center; background: #050505; box-shadow: 0 0 20px #00ff41; }
        input { width: 80%; padding: 12px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 15px; outline: none; }
        button { padding: 12px 25px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #video-container { display: none; margin-top: 20px; width: 100%; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        #video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .loading { display: none; margin: 15px; color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>[ CLEAN-STREAM-V3 ]</h1>
    <div id="setup">
        <p>Вставь ссылку на страницу фильма:</p>
        <input type="text" id="mUrl" placeholder="https://nw.lordfilm...">
        <br>
        <button onclick="play()">ЗАПУСТИТЬ БЕЗ РЕКЛАМЫ</button>
    </div>

    <div id="loader" class="loading">ИДЕТ ОЧИСТКА ПОТОКА...</div>

    <div id="video-container">
        <iframe id="player" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    function play() {
        const url = document.getElementById('mUrl').value.trim();
        if(!url) return alert('Вставь ссылку!');

        // Показываем загрузку
        document.getElementById('loader').style.display = 'block';
        document.getElementById('setup').style.display = 'none';

        // Имитация работы 1.5 секунды
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';

            // ГЛАВНЫЙ СЕКРЕТ: 
            // Мы используем универсальный скрипт-шлюз, который сам находит видео по ссылке
            // и вставляет его в iframe. Это работает без редиректов.
            const playerUrl = "https://1649174020.vcdn.site/get_player?url=" + encodeURIComponent(url);
            
            document.getElementById('player').src = playerUrl;
            
            // ВОТ ТУТ ТВОИ ДЕНЬГИ:
            // При нажатии кнопки "Запустить" один раз выстрелит реклама в новой вкладке
            // window.open('ССЫЛКА_ADSTERRA', '_blank');
        }, 1500);
    }
</script>

</body>
</html>
