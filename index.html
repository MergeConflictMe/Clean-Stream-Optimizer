<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-CLEANER | V4</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { border: 2px solid #00ff41; padding: 25px; width: 95%; max-width: 600px; text-align: center; background: #050505; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        #player-wrapper { display: none; margin-top: 20px; background: #111; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border: 1px solid #00ff41; }
        #player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .loading { display: none; color: #ff0055; margin: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>[ CLEAN-STREAM-V4 ]</h1>
    <div id="ui">
        <p>Вставьте ссылку на страницу Lordfilm:</p>
        <input type="text" id="urlInput" placeholder="https://nw.lordfilm...">
        <button onclick="loadPlayer()">ОЧИСТИТЬ И СМОТРЕТЬ</button>
    </div>

    <div id="loader" class="loading">ПОИСК ЧИСТОГО ПОТОКА...</div>

    <div id="player-wrapper">
        <iframe id="mainPlayer" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    function loadPlayer() {
        const rawUrl = document.getElementById('urlInput').value.trim();
        if(!rawUrl) return alert('Вставь ссылку!');

        document.getElementById('ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        // Мы используем "Всеядный" плеер-обходчик
        // Он берет ссылку и сам ищет рабочее видео во всех базах (Kodik, Videocdn, HDVB)
        const encodedUrl = encodeURIComponent(rawUrl);
        const playerUrl = "https://voidboost.net/embed/" + rawUrl.split('/').pop().split('-')[0] + "?link=" + encodedUrl;
        
        // ВТОРОЙ ВАРИАНТ (если первый не алё):
        const backupUrl = "https://black-vid.com/embed?url=" + encodedUrl;

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('player-wrapper').style.display = 'block';
            
            // Пробуем загрузить через агрегатор
            document.getElementById('mainPlayer').src = backupUrl;

            // ДЕНЬГИ (Раскомментируй, когда заработает видео):
            // window.open('ТВОЯ_ССЫЛКА_ADSTERRA', '_blank');
        }, 2000);
    }
</script>

</body>
</html>
