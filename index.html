<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | Оренбург Edition</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff41; padding: 30px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 15px #00ff41; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; display: block; text-decoration: none; margin-top: 10px; }
        #loader { display: none; margin-top: 20px; }
        .bar { width: 100%; height: 10px; background: #111; border: 1px solid #00ff41; margin: 10px 0; }
        .progress { width: 0%; height: 100%; background: #00ff41; transition: 0.3s; }
        #finalBtn { display: none; background: #ff0055; color: #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>[ LORD-CLEANER ]</h1>
    <div id="main-ui">
        <p>Вставьте ссылку на Лордфильм:</p>
        <input type="text" id="urlInput" placeholder="https://nw.lordfilm...">
        <button class="btn" onclick="start()">ОЧИСТИТЬ ПОТОК</button>
    </div>

    <div id="loader">
        <div id="status">> ИНИЦИАЛИЗАЦИЯ...</div>
        <div class="bar"><div id="pBar" class="progress"></div></div>
        <a href="#" id="finalBtn" class="btn">ОТКРЫТЬ ФИЛЬМ БЕЗ РЕКЛАМЫ</a>
    </div>
</div>

<script>
    function start() {
        const url = document.getElementById('urlInput').value.trim();
        if(!url) return alert('Вставь ссылку!');

        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let p = 0;
        const bar = document.getElementById('pBar');
        const status = document.getElementById('status');
        const fBtn = document.getElementById('finalBtn');

        const inv = setInterval(() => {
            p += 10;
            bar.style.width = p + '%';
            if(p == 40) status.innerText = '> ОБХОД ЗАЩИТЫ КАЗИНО...';
            if(p == 80) status.innerText = '> ФИЛЬТРАЦИЯ ПЛЕЕРА...';
            
            if(p >= 100) {
                clearInterval(inv);
                status.innerText = '> ПОТОК ОЧИЩЕН!';
                
                // Формируем чистую ссылку через зеркало-обходчик
                const cleanUrl = 'https://4h0y.gitlab.io/#' + url;
                
                // Настраиваем кнопку
                fBtn.href = cleanUrl;
                fBtn.style.display = 'block';
                
                // Сюда можно вставить твою Adsterra, чтобы она открылась при клике
                fBtn.onclick = function() {
                    // window.open('ССЫЛКА_ADSTERRA', '_blank'); // Раскомментируй потом
                };
            }
        }, 200);
    }
</script>

</body>
</html>
