<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD-CLEANER | Оренбург</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; border: 2px solid #00ff41; padding: 20px; background: #050505; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; }
        input { width: 80%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; outline: none; font-family: monospace; }
        button { width: 80%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #00cc33; box-shadow: 0 0 15px #00ff41; }
        .player-container { margin-top: 30px; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border: 1px solid #333; display: none; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>[ LORD-CLEANER PRO ]</h1>
        <p>Введи название фильма или ID Кинопоиска</p>
        
        <input type="text" id="movieInput" placeholder="Например: Интерстеллар или 258687">
        <br>
        <button onclick="watchMovie()">ЗАПУСТИТЬ БЕЗ РЕКЛАМЫ</button>

        <div id="playerBox" class="player-container">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>

        <p class="info">Система автоматически вырезает рекламу и подбирает лучший источник.</p>
    </div>

    <script>
        function watchMovie() {
            const input = document.getElementById('movieInput').value.trim();
            const playerBox = document.getElementById('playerBox');
            const iframe = document.getElementById('videoPlayer');

            if (!input) {
                alert("Введите название фильма!");
                return;
            }

            // Используем универсальный агрегатор плееров (пример на базе одного из бесплатных)
            // Эти базы сами чистят поток от большинства рекламы
            let searchUrl = "";
            
            if (!isNaN(input)) {
                // Если введено число (ID Кинопоиска)
                searchUrl = `https://vidsrc.to/embed/movie/${input}`;
            } else {
                // Если введено название - используем поиск (через сторонний сервис или прямую ссылку)
                // Для простоты сейчас сделаем поиск через агрегатор
                searchUrl = `https://www.google.com/search?q=site:lordfilm.lu+${encodeURIComponent(input)}`;
                alert("Сейчас откроется поиск по базе. Выбери фильм, а наш скрипт потом уберет мусор.");
                window.open(searchUrl, '_blank');
                return;
            }

            iframe.src = searchUrl;
            playerBox.style.display = 'block';
            
            // Прокрутка к плееру
            playerBox.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
