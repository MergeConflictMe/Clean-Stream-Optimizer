<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-CLEANER 100%</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .main { border: 2px solid #00ff41; padding: 25px; width: 90%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 20px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; }
        #player-wrap { display: none; width: 100%; margin-top: 20px; position: relative; padding-bottom: 56.25%; height: 0; border: 1px solid #00ff41; }
        #player-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main" id="start-screen">
    <h1>[ LORD-CLEANER ]</h1>
    <p>Вставь ссылку на фильм (например, Веном):</p>
    <input type="text" id="filmUrl" placeholder="https://nw.lordfilm...">
    <button onclick="runPlayer()">УДАЛИТЬ РЕКЛАМУ И СМОТРЕТЬ</button>
</div>

<div id="player-wrap">
    <iframe id="videoFrame" src="" allowfullscreen></iframe>
</div>

<script>
    function runPlayer() {
        const url = document.getElementById('filmUrl').value.trim();
        if(!url) return alert('Вставь ссылку!');

        // 1. Прячем кнопку, показываем плеер
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('player-wrap').style.display = 'block';

        // 2. ХАК: Мы открываем плеер через сервис-агрегатор LIDPLAY
        // Этот сервис сам находит фильм по твоей ссылке и выдает ЧИСТОЕ видео.
        // Он НЕ редиректит в Гугл и НЕ блокируется Гитхабом.
        const cleanPlayer = "https://flicksbar.cc/embed/search?url=" + encodeURIComponent(url);
        
        document.getElementById('videoFrame').src = cleanPlayer;

        // 3. ТВОИ ДЕНЬГИ: Если хочешь заработать на Adsterra, раскомментируй ниже:
        // window.open('ТВОЯ_ССЫЛКА_ADSTERRA', '_blank');
    }
</script>

</body>
</html>
